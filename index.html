<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Browser extensions manager UI</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <header>
    <div class="header-container card container">
      <img src="assets/images/logo.svg" alt="Logo" id="logo">
      <button id="theme-toggle" class="theme-toggle">
        <img id="theme-icon" src="assets/images/icon-moon.svg" alt="theme">
      </button>

    </div>
  </header>
  <div class="container extensions-list" >
    <div class="extensions-list-header">
      <h2>Extensions List</h2>
      <div class="nav-links">
        <ul>
          <li><button onclick="getAllExtensions()">All</button></li>
          <li><button onclick="getActiveExtensions()">Active</button></li>
          <li><button onclick="getInactiveExtensions()">Inactive</button></li>
        </ul>
      </div>
    </div>

    <div class="extensions-container" id="extensions-container">
      <!-- <div class="extensions-card card">
        <div class="extensions-card-body">
          <img src="/assets/images/logo-devlens.svg" class="extensions-logo" alt="DevLens">
          <div class="extensions-card-content">
            <h3 class="extensions-name">DevLens</h3>
            <p class="extensions-description">Quickly inspect page layouts and visualize element boundaries.</p>
          </div>
        </div>
        <div class="extensions-card-footer">
          <button class="remove">Remove</button>
          <label class="switch">
            <input type="checkbox" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div> -->
    </div>


  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.

  </footer>

  <script src="script.js"></script>
</body>

</html>
